/* ─── 計算引擎：依月份順序串出 結轉／結餘 ─── */
function computeAll(data) {
  const keys = Object.keys(data.months).sort();
  const out = {};
  let carry = [0, 0], cumBalance = 0, bankCash = 0;
  for (const k of keys) {
    const m = data.months[k];
    const prepaid = [0, 1].map((p) => m.expenses.filter((e) => e.payer === p).reduce((s, e) => s + e.amount, 0));
    const income = m.due[0] + m.due[1] + m.extra[0].amount + m.extra[1].amount;
    const expense = m.expenses.reduce((s, e) => s + e.amount, 0);
    const expected = [0, 1].map((p) => m.due[p] + m.extra[p].amount + carry[p] - prepaid[p]);
    const unsettled = [0, 1].map((p) => expected[p] - (m.actual[p] ?? 0));
    const commonPaid = m.expenses.filter((e) => e.payer === 2).reduce((s, e) => s + e.amount, 0);
    bankCash += (m.actual[0] ?? 0) + (m.actual[1] ?? 0) - commonPaid;
    const prevBalance = cumBalance;
    cumBalance += income - expense;
    const cats = {};
    m.expenses.forEach((e) => { cats[e.cat] = (cats[e.cat] || 0) + e.amount; });
    out[k] = { prepaid, income, expense, expected, unsettled, carryIn: [...carry], prevBalance, cumBalance, bankCash, cats };
    carry = unsettled;
  }
  return { keys, byMonth: out };
}

/* ─── 主元件 ─── */
function FamilyLedger() {
  const [data, setData] = useState(null);
  const [cur, setCur] = useState(null);
  const [tab, setTab] = useState("overview");
  const [saveState, setSaveState] = useState("idle");
  const [showSettings, setShowSettings] = useState(false);
  const [phase, setPhase] = useState("boot");   // boot | config | setup | ready
  const [familyCode, setFamilyCode] = useState("");
  const [myName, setMyName] = useState("");
  const [form, setForm] = useState({ date: "", cat: "伙食", item: "", amount: "", payer: 2, note: "" });
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState(null);
  const saveTimer = useRef(null);
  const loaded = useRef(false);
  const dbRef = useRef(null);
  const codeRef = useRef("");
  const lastWritten = useRef("");
  const skipSave = useRef(false);

  const subscribe = (db, code) => {
    codeRef.current = code;
    const ref = db.collection("ledgers").doc(code);
    ref.get().then((snap) => {
      if (!snap.exists) ref.set({ json: JSON.stringify(SEED), updatedAt: Date.now() });
    }).catch(() => setSaveState("error"));
    ref.onSnapshot((snap) => {
      if (!snap.exists) return;
      const json = snap.data().json;
      setPhase("ready");
      if (json === lastWritten.current) { loaded.current = true; return; }
      try {
        const d = JSON.parse(json);
        skipSave.current = true;
        setData(d);
        setCur((prev) => (prev && d.months[prev] ? prev : Object.keys(d.months).sort().slice(-1)[0]));
        loaded.current = true;
        setSaveState("saved");
      } catch (e) {}
    }, () => setSaveState("error"));
  };

  useEffect(() => {
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.startsWith("請貼上")) { setPhase("config"); return; }
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    try { db.enablePersistence({ synchronizeTabs: true }).catch(() => {}); } catch (e) {}
    dbRef.current = db;
    firebase.auth().signInAnonymously().catch(() => setSaveState("error"));
    const code = localStorage.getItem("family-code") || "";
    setMyName(localStorage.getItem("my-name") || "");
    if (code) { setFamilyCode(code); subscribe(db, code); }
    else setPhase("setup");
  }, []);

  const startSync = () => {
    const code = familyCode.trim();
    if (!code) return;
    localStorage.setItem("family-code", code);
    localStorage.setItem("my-name", myName.trim());
    subscribe(dbRef.current, code);
  };
  const changeFamily = () => {
    localStorage.removeItem("family-code");
    window.location.reload();
  };

  useEffect(() => {
    if (!loaded.current || !data) return;
    if (skipSave.current) { skipSave.current = false; return; }
    setSaveState("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      const json = JSON.stringify(data);
      lastWritten.current = json;
      dbRef.current.collection("ledgers").doc(codeRef.current)
        .set({ json, updatedAt: Date.now(), updatedBy: myName })
        .then(() => setSaveState("saved"))
        .catch(() => setSaveState("error"));
    }, 600);
  }, [data]);

  if (phase === "config") return (
    <div style={styles.page}><style>{css}</style>
      <div style={{ ...styles.card, maxWidth: 460, margin: "60px auto" }}>
        <div style={styles.eyebrow}>還差一步</div>
        <h1 style={{ ...styles.title, fontSize: 24 }}>尚未連接雲端資料庫</h1>
        <p style={{ fontSize: 14, color: "#5C6B64", lineHeight: 1.8 }}>
          請依照「設定教學.md」建立免費的 Firebase 專案，
          把取得的 firebaseConfig 貼進 index.html 最上方的
          FIREBASE_CONFIG 區塊，重新上傳後再開啟這個頁面。
        </p>
      </div>
    </div>
  );
  if (phase === "setup") return (
    <div style={styles.page}><style>{css}</style>
      <div style={{ ...styles.card, maxWidth: 420, margin: "60px auto" }}>
        <div style={styles.eyebrow}>共同帳戶・雲端同步</div>
        <h1 style={{ ...styles.title, fontSize: 26, marginBottom: 10 }}>我們家的帳</h1>
        <p style={{ fontSize: 14, color: "#5C6B64", lineHeight: 1.8 }}>
          兩支手機輸入<b>同一組家庭代碼</b>，就會共用同一本帳、即時同步。
          代碼請設長一點、別人猜不到（像密碼一樣保管）。
        </p>
        <input style={{ ...styles.input, marginBottom: 10 }} placeholder="家庭代碼（例：chen-home-9x2k7）"
          value={familyCode} onChange={(e) => setFamilyCode(e.target.value)} />
        <input style={{ ...styles.input, marginBottom: 14 }} placeholder="你的名字（例：家盈）"
          value={myName} onChange={(e) => setMyName(e.target.value)} />
        <button style={{ ...styles.addBtn, width: "100%", padding: "12px" }} onClick={startSync}>開始記帳</button>
      </div>
    </div>
  );
  if (!data || !cur) return <div style={{ fontFamily: "'Noto Sans TC',sans-serif", padding: 40, color: "#7A8681" }}>連線雲端帳本中⋯</div>;

  const { keys, byMonth } = computeAll(data);
  const m = data.months[cur];
  const c = byMonth[cur];
  const names = data.names;

  const patchMonth = (patch) => setData({ ...data, months: { ...data.months, [cur]: { ...m, ...patch } } });
  const setNum = (arr, i, v, key) => { const a = [...m[key]]; a[i] = v; patchMonth({ [key]: a }); };

  const addExpense = () => {
    if (!form.item || !form.amount) return;
    const e = { id: uid(), date: form.date || `${cur}-01`, cat: form.cat, item: form.item, amount: Number(form.amount), payer: Number(form.payer), note: form.note, by: myName };
    patchMonth({ expenses: [...m.expenses, e].sort((a, b) => a.date.localeCompare(b.date)) });
    setForm({ ...form, item: "", amount: "", note: "" });
  };
  const delExpense = (id) => patchMonth({ expenses: m.expenses.filter((e) => e.id !== id) });
  const startEdit = (e) => { setEditId(e.id); setEditForm({ ...e, amount: String(e.amount) }); };
  const cancelEdit = () => { setEditId(null); setEditForm(null); };
  const saveEdit = () => {
    if (!editForm.item || editForm.amount === "") return;
    patchMonth({
      expenses: m.expenses.map((x) => x.id === editId
        ? { ...x, date: editForm.date, cat: editForm.cat, item: editForm.item, amount: Number(editForm.amount), payer: Number(editForm.payer), note: editForm.note }
        : x).sort((a, b) => a.date.localeCompare(b.date)),
    });
    cancelEdit();
  };

  const addMonth = () => {
    const k = nextMonthKey(keys[keys.length - 1]);
    setData({ ...data, months: { ...data.months, [k]: { due: [...m.due], extra: [{ amount: 0, note: "" }, { amount: 0, note: "" }], actual: [null, null], expenses: [] } } });
    setCur(k); setTab("overview");
  };
  const delMonth = () => {
    if (keys.length <= 1) return;
    const k = keys[keys.length - 1];
    const rest = { ...data.months }; delete rest[k];
    setData({ ...data, months: rest });
    setCur(keys[keys.length - 2]);
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "家庭帳本備份.json"; a.click();
    URL.revokeObjectURL(a.href);
  };
  const importData = (ev) => {
    const f = ev.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try { const d = JSON.parse(r.result); setData(d); setCur(Object.keys(d.months).sort().slice(-1)[0]); }
      catch (e) { alert("備份檔格式不正確"); }
    };
    r.readAsText(f); ev.target.value = "";
  };

  const payerName = (p) => (p === 2 ? "共同帳戶" : `${names[p]}先墊`);
  const payerColor = (p) => (p === 2 ? "#1D6A52" : p === 0 ? "#B98A2F" : "#5B7FA6");
  const allSettled = c.unsettled.every((u, i) => (m.actual[i] !== null) && Math.abs(u) < 0.5);

  const S = styles;
  return (
    <div style={S.page}>
      <style>{css}</style>

      {/* 表頭 */}
      <header style={S.header}>
        <div>
          <div style={S.eyebrow}>共同帳戶・月結帳本</div>
          <h1 style={S.title}>我們家的帳</h1>
        </div>
        <div style={S.saveTag}>
          {saveState === "saving" ? "同步中⋯" : saveState === "error" ? "離線，恢復連線後自動同步" : "已同步雲端"}
        </div>
      </header>

      {/* 月份選單 */}
      <div style={S.monthBar}>
        {keys.map((k) => (
          <button key={k} onClick={() => setCur(k)} className="mtab" style={{ ...S.mtab, ...(k === cur ? S.mtabOn : {}) }}>
            {monthLabel(k)}
          </button>
        ))}
        <button onClick={addMonth} style={{ ...S.mtab, borderStyle: "dashed", color: "#1D6A52" }}>＋ 新月份</button>
      </div>

      {/* 分頁 */}
      <nav style={S.tabs}>
        {[["overview", "總覽與結算"], ["expenses", "支出明細"], ["analysis", "類別分析"]].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)} style={{ ...S.tab, ...(tab === id ? S.tabOn : {}) }}>{label}</button>
        ))}
      </nav>

      {tab === "overview" && (
        <>
          {/* 收支總覽 */}
          <section style={S.card}>
            <div style={S.cardHead}>① 收支總覽</div>
            <div style={S.grid4}>
              <Stat label="上月結餘" value={c.prevBalance} />
              <Stat label="本月總收入" value={c.income} />
              <Stat label="本月總支出" value={c.expense} />
              <Stat label="累計結餘" value={c.cumBalance} big />
            </div>
            <div style={S.bankLine}>
              推算銀行餘額 <b style={{ fontVariantNumeric: "tabular-nums" }}>{fmt(c.bankCash)}</b>
              {Math.abs(c.bankCash - c.cumBalance) < 0.5
                ? <span style={S.okChip}>與帳面一致</span>
                : <span style={S.warnChip}>與帳面差 {fmt(c.cumBalance - c.bankCash)}（有未結款）</span>}
            </div>
          </section>

          {/* 匯款結算 */}
          <section style={S.card}>
            <div style={S.cardHead}>② 匯款結算 <span style={S.hint}>應匯入為負＝帳戶欠他，帳戶退款時「實際匯入」填負數</span></div>
            <div style={S.settleWrap}>
              {[0, 1].map((p) => {
                const settled = m.actual[p] !== null && Math.abs(c.unsettled[p]) < 0.5;
                return (
                  <div key={p} style={S.slip}>
                    <div style={S.slipName}>{names[p]}</div>
                    <SlipRow label="本月應繳"><NumInput value={m.due[p]} onChange={(v) => setNum(m.due, p, v, "due")} /></SlipRow>
                    <SlipRow label="代收款">
                      <NumInput value={m.extra[p].amount} onChange={(v) => { const a = [...m.extra]; a[p] = { ...a[p], amount: v }; patchMonth({ extra: a }); }} />
                    </SlipRow>
                    <input
                      style={S.noteInput} placeholder="代收備註（如：媽媽給的）" value={m.extra[p].note}
                      onChange={(e) => { const a = [...m.extra]; a[p] = { ...a[p], note: e.target.value }; patchMonth({ extra: a }); }}
                    />
                    <SlipRow label="上月結轉" auto value={c.carryIn[p]} />
                    <SlipRow label="先行支出（自動）" auto value={-c.prepaid[p]} />
                    <div style={S.slipMain}>
                      <span>應匯入金額</span>
                      <b style={{ color: c.expected[p] < 0 ? "#BF3F2E" : "#17322B", fontSize: 22, fontVariantNumeric: "tabular-nums" }}>{fmt(c.expected[p])}</b>
                    </div>
                    <SlipRow label="實際匯入">
                      <NumInput value={m.actual[p]} placeholder="尚未匯" allowNull onChange={(v) => setNum(m.actual, p, v, "actual")} />
                    </SlipRow>
                    <div style={{ ...S.stamp, ...(settled ? S.stampOk : S.stampNo) }}>
                      {m.actual[p] === null ? "待匯款" : settled ? "已結清" : `未結 ${fmt(c.unsettled[p])}（自動轉下月）`}
                    </div>
                  </div>
                );
              })}
            </div>
            {allSettled && <div style={S.allOk}>本月兩人皆已結清，銀行餘額應等於累計結餘 {fmt(c.cumBalance)}。</div>}
          </section>
        </>
      )}

      {tab === "expenses" && (
        <section style={S.card}>
          <div style={S.cardHead}>③ 支出明細 <span style={S.hint}>點任一筆可直接修改；退貨退款填負數金額</span></div>

          {/* 新增列 */}
          <div style={S.form}>
            <input type="date" style={S.input} value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} />
            <select style={S.input} value={form.cat} onChange={(e) => setForm({ ...form, cat: e.target.value })}>
              {CATS.map((x) => <option key={x}>{x}</option>)}
            </select>
            <input style={S.input} placeholder="項目（如：貓飼料）" value={form.item} onChange={(e) => setForm({ ...form, item: e.target.value })} />
            <input style={S.input} type="number" inputMode="decimal" placeholder="金額" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} />
            <select style={S.input} value={form.payer} onChange={(e) => setForm({ ...form, payer: e.target.value })}>
              <option value={2}>共同帳戶</option><option value={0}>{names[0]}先墊</option><option value={1}>{names[1]}先墊</option>
            </select>
            <input style={S.input} placeholder="備註（選填）" value={form.note} onChange={(e) => setForm({ ...form, note: e.target.value })} />
            <button style={S.addBtn} onClick={addExpense}>記一筆</button>
          </div>

          {/* 明細列表 */}
          {m.expenses.length === 0 && <div style={S.empty}>還沒有紀錄。記下第一筆支出，結算區就會自動更新。</div>}
          <div>
            {m.expenses.map((e) => editId === e.id ? (
              <div key={e.id} style={{ background: "#F0F5F2", borderRadius: 10, padding: "10px 8px", marginBottom: 6 }}>
                <div style={{ ...S.form, marginBottom: 8 }}>
                  <input type="date" style={S.input} value={editForm.date} onChange={(ev) => setEditForm({ ...editForm, date: ev.target.value })} />
                  <select style={S.input} value={editForm.cat} onChange={(ev) => setEditForm({ ...editForm, cat: ev.target.value })}>
                    {CATS.map((x) => <option key={x}>{x}</option>)}
                  </select>
                  <input style={S.input} placeholder="項目" value={editForm.item} onChange={(ev) => setEditForm({ ...editForm, item: ev.target.value })} />
                  <input style={S.input} type="number" inputMode="decimal" placeholder="金額" value={editForm.amount} onChange={(ev) => setEditForm({ ...editForm, amount: ev.target.value })} />
                  <select style={S.input} value={editForm.payer} onChange={(ev) => setEditForm({ ...editForm, payer: ev.target.value })}>
                    <option value={2}>共同帳戶</option><option value={0}>{names[0]}先墊</option><option value={1}>{names[1]}先墊</option>
                  </select>
                  <input style={S.input} placeholder="備註（選填）" value={editForm.note} onChange={(ev) => setEditForm({ ...editForm, note: ev.target.value })} />
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button style={{ ...S.addBtn, flex: 1 }} onClick={saveEdit}>儲存修改</button>
                  <button style={{ ...S.addBtn, flex: 1, background: "#7A8681" }} onClick={cancelEdit}>取消</button>
                </div>
              </div>
            ) : (
              <div key={e.id} style={S.row}>
                <span style={S.rowDate}>{e.date.slice(5).replace("-", "/")}</span>
                <span style={{ ...S.catDot, background: CAT_COLOR[e.cat] }} />
                <span style={{ ...S.rowItem, cursor: "pointer" }} onClick={() => startEdit(e)}>
                  {e.item}
                  <span style={S.rowSub}>{e.cat}{e.by ? `・${e.by}記` : ""}{e.note ? `・${e.note}` : ""}</span>
                </span>
                <span style={{ ...S.payerChip, color: payerColor(e.payer), borderColor: payerColor(e.payer), cursor: "pointer" }} onClick={() => startEdit(e)}>{payerName(e.payer)}</span>
                <span style={{ ...S.rowAmt, color: e.amount < 0 ? "#BF3F2E" : "#17322B" }}>{fmt(e.amount)}</span>
                <button style={{ ...S.del, color: "#7A8681" }} onClick={() => startEdit(e)} aria-label="編輯">✎</button>
                <button style={S.del} onClick={() => delExpense(e.id)} aria-label="刪除">✕</button>
              </div>
            ))}
          </div>
          <div style={S.totalLine}>本月合計 <b style={{ fontVariantNumeric: "tabular-nums" }}>{fmt(c.expense)}</b></div>
        </section>
      )}

      {tab === "analysis" && (
        <section style={S.card}>
          <div style={S.cardHead}>④ 類別分析</div>
          {c.expense === 0 ? <div style={S.empty}>本月尚無支出可分析。</div> : (
            <div>
              {CATS.filter((k) => c.cats[k]).sort((a, b) => c.cats[b] - c.cats[a]).map((k) => {
                const v = c.cats[k], pct = (v / c.expense) * 100;
                return (
                  <div key={k} style={{ marginBottom: 14 }}>
                    <div style={S.barLabel}>
                      <span>{k}</span>
                      <span style={{ fontVariantNumeric: "tabular-nums" }}>{fmt(v)}<span style={S.pct}>{pct.toFixed(1)}%</span></span>
                    </div>
                    <div style={S.barBg}><div style={{ ...S.bar, width: `${pct}%`, background: CAT_COLOR[k] }} /></div>
                  </div>
                );
              })}
              <div style={S.splitLine}>
                付款來源：{names[0]}先墊 {fmt(c.prepaid[0])}｜{names[1]}先墊 {fmt(c.prepaid[1])}｜共同帳戶 {fmt(c.expense - c.prepaid[0] - c.prepaid[1])}
              </div>
            </div>
          )}
        </section>
      )}

      {/* 設定 */}
      <div style={S.footer}>
        <button style={S.linkBtn} onClick={() => setShowSettings(!showSettings)}>{showSettings ? "收起設定" : "設定"}</button>
        {showSettings && (
          <div style={S.settings}>
            <label style={S.setLabel}>成員一 <input style={S.input} value={names[0]} onChange={(e) => setData({ ...data, names: [e.target.value, names[1]] })} /></label>
            <label style={S.setLabel}>成員二 <input style={S.input} value={names[1]} onChange={(e) => setData({ ...data, names: [names[0], e.target.value] })} /></label>
            {keys.length > 1 && <button style={{ ...S.linkBtn, color: "#BF3F2E" }} onClick={delMonth}>刪除最後一個月份（{monthLabel(keys[keys.length - 1])}）</button>}
            <div style={{ display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
              <button style={S.linkBtn} onClick={exportData}>匯出備份</button>
              <label style={{ ...S.linkBtn, cursor: "pointer" }}>匯入備份<input type="file" accept=".json" style={{ display: "none" }} onChange={importData} /></label>
              <button style={S.linkBtn} onClick={changeFamily}>更換家庭代碼</button>
            </div>
            <div style={{ fontSize: 12, color: "#7A8681" }}>目前家庭代碼：{codeRef.current}｜我是：{myName || "未設定"}</div>
          </div>
        )}
        <div style={S.footNote}>帳本儲存在雲端，兩支手機輸入同一組家庭代碼即可即時同步；沒網路時可照常記帳，恢復連線後自動補傳。</div>
      </div>
    </div>
  );
}

/* ─── 小元件 ─── */
function Stat({ label, value, big }) {
  return (
    <div style={{ padding: "10px 12px", background: big ? "#EAF2EE" : "transparent", borderRadius: 10 }}>
      <div style={{ fontSize: 12, color: "#7A8681", marginBottom: 2 }}>{label}</div>
      <div style={{ fontFamily: "Georgia,'Noto Serif TC',serif", fontSize: big ? 26 : 20, fontWeight: 700, color: value < 0 ? "#BF3F2E" : "#17322B", fontVariantNumeric: "tabular-nums" }}>
        {fmt(value)}
      </div>
    </div>
  );
}
function SlipRow({ label, children, auto, value }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px dashed #DDE4E0", fontSize: 14 }}>
      <span style={{ color: "#5C6B64" }}>{label}</span>
      {auto ? <span style={{ fontVariantNumeric: "tabular-nums", color: value < 0 ? "#BF3F2E" : "#17322B" }}>{fmt(value)}</span> : children}
    </div>
  );
}
function NumInput({ value, onChange, placeholder, allowNull }) {
  return (
    <input
      type="number" inputMode="decimal"
      style={{ width: 110, textAlign: "right", border: "1px solid #C9D3CE", borderRadius: 8, padding: "4px 8px", fontSize: 14, fontVariantNumeric: "tabular-nums", background: "#fff", color: "#17322B" }}
      value={value ?? ""} placeholder={placeholder}
      onChange={(e) => {
        const v = e.target.value;
        if (v === "" && allowNull) return onChange(null);
        onChange(Number(v) || 0);
      }}
    />
  );
}
